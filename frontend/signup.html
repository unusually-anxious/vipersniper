<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Signup</title></head><body><h1>Create account</h1><form id="signupForm"><input id="email" type="email" placeholder="email" required><input id="password" type="password" placeholder="password" required><button type="submit">Create Account</button></form><p><a href="/login.html">Already have an account? Login</a></p><script src="/js/api.js"></script><script>document.getElementById("signupForm").addEventListener("submit",async function(e){e.preventDefault();alert("Signup clicked");const email=document.getElementById("email").value.trim();const password=document.getElementById("password").value;try{const res=await signup(email,password);alert(JSON.stringify(res));if(res.user||res.id||res.email){alert("Account created");window.location="/login.html";}else{alert(res.detail||res.error||"Signup failed");}}catch(err){alert("Signup error: "+err.message);}});</script></body></html>
