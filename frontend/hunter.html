<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Zero-Bid Hunter</title><style>:root{--bg:#06070b;--panel:#0d111b;--line:rgba(255,255,255,.08);--text:#f5f7fb;--muted:#a7b0c3;--teal:#27f5c7;--cyan:#58a6ff;--violet:#9b7bff;--shadow:0 20px 60px rgba(0,0,0,.45)}*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,Arial,sans-serif;background:radial-gradient(circle at 15% 20%,rgba(39,245,199,.12),transparent 24%),radial-gradient(circle at 80% 18%,rgba(155,123,255,.14),transparent 26%),radial-gradient(circle at 60% 75%,rgba(88,166,255,.10),transparent 28%),linear-gradient(180deg,#05060a,#070a12 42%,#05060a);color:var(--text);min-height:100vh}.wrap{max-width:1200px;margin:0 auto;padding:20px 16px 120px}.topbar,.hero,.panel,.listing,.nav{background:linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.02));border:1px solid var(--line);box-shadow:var(--shadow)}.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 18px;border-radius:24px;margin-bottom:18px;backdrop-filter:blur(14px)}.brand{display:flex;align-items:center;gap:12px;font-size:1.75rem;font-weight:800}.logo{width:42px;height:42px;border-radius:14px;background:linear-gradient(135deg,var(--teal),var(--cyan) 55%,var(--violet));box-shadow:0 0 30px rgba(39,245,199,.22)}.pill{padding:10px 16px;border-radius:999px;border:1px solid rgba(255,255,255,.08);background:linear-gradient(180deg,rgba(39,245,199,.14),rgba(88,166,255,.14));color:#fff;font-weight:700}.hero{border-radius:30px;padding:28px;position:relative;overflow:hidden;margin-bottom:18px}.hero:before{content:"";position:absolute;inset:0;background:radial-gradient(circle at 80% 22%,rgba(72,213,151,.18),transparent 18%),radial-gradient(circle at 68% 18%,rgba(155,123,255,.17),transparent 22%),linear-gradient(120deg,rgba(39,245,199,.06),transparent 30%,rgba(88,166,255,.08));pointer-events:none}.hero h1{position:relative;margin:0 0 12px;font-size:clamp(2.3rem,8vw,4.5rem);line-height:.95;letter-spacing:-.04em}.hero p{position:relative;margin:0;color:var(--muted);font-size:1.05rem;max-width:720px;line-height:1.7}.panel{border-radius:24px;padding:22px;margin-bottom:18px}.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.field label{display:block;color:var(--muted);font-size:.92rem;margin-bottom:8px}.field input,.field select{width:100%;padding:15px 16px;border-radius:16px;border:1px solid var(--line);background:rgba(255,255,255,.03);color:#fff;font-size:1rem}.summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}.metric{padding:18px;border-radius:20px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.02));border:1px solid var(--line)}.metric .k{color:var(--muted);font-size:.92rem}.metric .v{font-size:2.2rem;font-weight:900;margin-top:8px}.section-title{font-size:2.1rem;font-weight:900;letter-spacing:-.04em;margin:22px 0 14px}.listings{display:grid;gap:18px}.listing{border-radius:28px;overflow:hidden}.listing img{width:100%;height:260px;object-fit:cover;display:block}.img-wrap{position:relative}.badge-row{position:absolute;top:16px;left:16px;right:16px;display:flex;justify-content:space-between;gap:10px}.left-badges{display:flex;gap:10px;flex-wrap:wrap}.badge{padding:11px 16px;border-radius:999px;font-size:.95rem;font-weight:800;color:#fff;background:rgba(24,26,34,.7);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1)}.badge.zero{background:rgba(72,213,151,.85)}.badge.score{background:rgba(155,123,255,.85)}.listing-body{padding:22px}.listing h3{margin:0 0 6px;font-size:2rem;letter-spacing:-.03em}.meta{color:var(--muted);font-size:1.08rem;margin-bottom:16px}.price{font-size:2.8rem;font-weight:900;letter-spacing:-.04em;margin:8px 0 18px}.facts{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:18px}.fact{padding:18px 20px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.02));border:1px solid var(--line);border-radius:20px}.fact span{display:block;color:var(--muted);font-size:.88rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}.fact strong{font-size:1.1rem}.actions{display:grid;grid-template-columns:1.3fr 1fr 1fr;gap:12px}.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 20px;border-radius:18px;text-decoration:none;color:#fff;font-weight:800;border:1px solid rgba(255,255,255,.08)}.btn.primary{background:linear-gradient(135deg,var(--teal),#6bf0b8);color:#061018}.btn.secondary{background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.03))}.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:16px;width:min(92vw,760px);display:grid;grid-template-columns:repeat(5,1fr);gap:12px;padding:12px;border-radius:24px;background:rgba(10,12,20,.82);backdrop-filter:blur(18px);z-index:30}.nav a{padding:16px 10px;border-radius:18px;text-decoration:none;color:#d7deed;text-align:center;font-weight:800;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.05)}.nav a.active{background:linear-gradient(135deg,var(--teal),var(--cyan),var(--violet));color:#071019}@media (max-width:900px){.filters,.summary{grid-template-columns:repeat(2,1fr)}.actions{grid-template-columns:1fr}.listing h3{font-size:1.6rem}.price{font-size:2.3rem}}@media (max-width:640px){.wrap{padding:14px 14px 120px}.hero{padding:22px}.filters,.summary,.facts{grid-template-columns:1fr}.brand{font-size:1.35rem}.nav{gap:8px;padding:10px}.nav a{font-size:.9rem;padding:14px 8px}}</style></head><body><div class="wrap"><div class="topbar"><div class="brand"><div class="logo"></div><div>ViperSniper</div></div><div class="pill">Hunter</div></div><section class="hero"><h1>Zero-Bid Hunter</h1><p>Search across live inventory, isolate no-bid opportunities, and move into detail view fast.</p></section><section class="panel"><div class="filters"><div class="field"><label>Search</label><input id="searchBox" placeholder="Tesla, F-150, VIN, location"></div><div class="field"><label>Minimum Score</label><select id="scoreFilter"><option value="0">All scores</option><option value="50">50+</option><option value="70">70+</option><option value="80">80+</option></select></div><div class="field"><label>Source</label><select id="sourceFilter"><option value="">All sources</option></select></div><div class="field"><label>Sort</label><select id="sortFilter"><option value="score">Highest score</option><option value="bid">Lowest bid</option><option value="year">Newest year</option></select></div></div><div class="summary"><div class="metric"><div class="k">Zero Bid Results</div><div class="v" id="zeroCount">0</div></div><div class="metric"><div class="k">Average Score</div><div class="v" id="avgScore">0</div></div><div class="metric"><div class="k">Sources</div><div class="v" id="sourceCount">0</div></div></div></section><div class="section-title">Results Feed</div><div id="results" class="listings"><div class="panel">Loading zero-bid listings…</div></div></div><nav class="nav"><a href="/index.html">Dashboard</a><a class="active" href="/hunter.html">Hunter</a><a href="/alerts.html">Alerts</a><a href="/watchlist.html">Watchlist</a><a href="/site.html">Site</a></nav><script>const API="http://127.0.0.1:8000";let allItems=[];function render(){const q=document.getElementById("searchBox").value.toLowerCase().trim();const minScore=Number(document.getElementById("scoreFilter").value||0);const source=document.getElementById("sourceFilter").value;const sort=document.getElementById("sortFilter").value;let items=allItems.filter(i=>Number(i.bid)===0).filter(i=>Number(i.score||0)>=minScore).filter(i=>!source||String(i.source||"")===source).filter(i=>{if(!q)return true;const hay=[i.title,i.make,i.model,i.vin,i.location,i.source].join(" ").toLowerCase();return hay.includes(q)});if(sort==="score")items.sort((a,b)=>Number(b.score||0)-Number(a.score||0));if(sort==="bid")items.sort((a,b)=>Number(a.bid||0)-Number(b.bid||0));if(sort==="year")items.sort((a,b)=>Number(b.year||0)-Number(a.year||0));document.getElementById("zeroCount").textContent=items.length;document.getElementById("avgScore").textContent=items.length?Math.round(items.reduce((s,i)=>s+Number(i.score||0),0)/items.length):0;document.getElementById("sourceCount").textContent=new Set(items.map(i=>i.source||"unknown")).size;const results=document.getElementById("results");results.innerHTML=items.map(item=>`<article class="listing"><div class="img-wrap"><img src="${item.image_url||'https://images.unsplash.com/photo-1494976388531-d1058494cdd8?auto=format&fit=crop&w=1400&q=80'}" alt="${item.title||''}"><div class="badge-row"><div class="left-badges"><span class="badge">${item.source||'demo_api'}</span><span class="badge zero">Zero Bid</span></div><span class="badge score">Score ${item.score??0}</span></div></div><div class="listing-body"><h3>${item.title||`${item.year||''} ${item.make||''} ${item.model||''}`}</h3><div class="meta">${item.location||'Unknown location'}</div><div class="price">$${item.bid??0}</div><div class="facts"><div class="fact"><span>Year</span><strong>${item.year??'—'}</strong></div><div class="fact"><span>Make / Model</span><strong>${item.make||''} ${item.model||''}</strong></div><div class="fact"><span>Location</span><strong>${item.location||'—'}</strong></div><div class="fact"><span>End Time</span><strong>${item.end_time||'—'}</strong></div><div class="fact"><span>Title</span><strong>${item.title_status||'Clean'}</strong></div><div class="fact"><span>Damage</span><strong>${item.damage||'—'}</strong></div><div class="fact"><span>VIN</span><strong>${item.vin||'—'}</strong></div><div class="fact"><span>Image Count</span><strong>${item.images?.length||0}</strong></div></div><div class="actions"><a class="btn primary" href="/detail.html?id=${item.id}">Open</a><a class="btn secondary" href="/watchlist.html">Watch</a><a class="btn secondary" href="/alerts.html">Alert</a></div></div></article>`).join("")||'<div class="panel">No zero-bid listings found.</div>'}async function load(){try{const res=await fetch(API+"/listings");const data=await res.json();allItems=data.items||[];const select=document.getElementById("sourceFilter");[...new Set(allItems.map(i=>i.source).filter(Boolean))].forEach(src=>{const o=document.createElement("option");o.value=src;o.textContent=src;select.appendChild(o)});["searchBox","scoreFilter","sourceFilter","sortFilter"].forEach(id=>document.getElementById(id).addEventListener("input",render));document.getElementById("scoreFilter").addEventListener("change",render);document.getElementById("sourceFilter").addEventListener("change",render);document.getElementById("sortFilter").addEventListener("change",render);render()}catch(err){document.getElementById("results").innerHTML=`<div class="panel">Hunter load failed: ${err.message}</div>`}}document.addEventListener("DOMContentLoaded",load);</script></body></html>
