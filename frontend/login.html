<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Login</title></head><body><h1>Login</h1><form id="loginForm"><input id="email" type="email" placeholder="email" required><input id="password" type="password" placeholder="password" required><button type="submit">Login</button></form><p><a href="/signup.html">Create account</a></p><script src="/js/api.js"></script><script>document.getElementById("loginForm").addEventListener("submit",async function(e){e.preventDefault();alert("Login clicked");const email=document.getElementById("email").value.trim();const password=document.getElementById("password").value;try{const res=await login(email,password);alert(JSON.stringify(res));if(res.access_token){window.location="/index.html";}else{alert(res.detail||res.error||"Login failed");}}catch(err){alert("Login error: "+err.message);}});</script></body></html>
